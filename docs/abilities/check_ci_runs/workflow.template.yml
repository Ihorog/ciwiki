# =============================================================================
# NOTES FOR CONSUMER REPOS
# =============================================================================
#
# 1. SECRETS
#    If TARGET_REPO is private and belongs to a different owner, add a PAT:
#    Settings → Secrets and variables → Actions → New repository secret
#    Name: CI_READ_TOKEN
#    Value: ghp_... (PAT with repo:read scope)
#
#    If TARGET_REPO is in the same org/owner and is public, GITHUB_TOKEN suffices.
#
# 2. SCRIPT LOCATION
#    Copy check_ci_runs.sh.template to scripts/check_ci_runs.sh in your repo.
#    Make it executable: chmod +x scripts/check_ci_runs.sh
#
# 3. FAIL_ON_ERROR
#    Set env var FAIL_ON_ERROR=1 to fail the workflow if any runs failed.
#    Default is 0 (report only, do not fail).
#
# 4. JOB SUMMARY
#    The script automatically populates GITHUB_STEP_SUMMARY when running in
#    GitHub Actions, providing a formatted table in the workflow run UI.
#
# 5. ARTIFACT
#    The JSON report is uploaded as an artifact (ci-runs-report-<run-id>)
#    retained for 7 days. Increase retention_days for audit/compliance.
#
# =============================================================================
