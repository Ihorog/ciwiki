name: Master Issue Template
description: Track large initiatives or features
title: "[MASTER] "
labels: ["master-issue", "epic", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        # Master Issue Template

        Використовуйте цей template для великих ініціатив, features або epics що потребують координації множини задач.

        Докладна документація: [Master Issue Workflow](https://github.com/Ihorog/ciwiki/blob/main/docs/processes/master-issue.md)

  - type: textarea
    id: objective
    attributes:
      label: 🎯 Objective
      description: Чіткий опис що ми будуємо та чому
      placeholder: |
        **Value Proposition**: Яку бізнес-цінність це принесе?

        **Success Criteria**: Як ми зрозуміємо що це завершено?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 📋 Context
      description: Контекст та обґрунтування
      placeholder: |
        ### Background
        - Чому ми робимо це зараз?
        - Яку проблему ми вирішуємо?
        - Хто є stakeholders?

        ### Scope
        **In Scope:**
        - Item 1
        - Item 2

        **Out of Scope:**
        - Item A (відкладено на v2)
        - Item B (окрема ініціатива)
      render: markdown
    validations:
      required: true

  - type: textarea
    id: timeline
    attributes:
      label: 🗓️ Timeline
      description: Приблизний графік
      placeholder: |
        - **Start Date**: 2026-03-04
        - **Target Completion**: 2026-04-01
        - **Milestones**:
          - [ ] Phase 1: Foundation (Week 1-2)
          - [ ] Phase 2: Core Features (Week 3-4)
          - [ ] Phase 3: Polish & Release (Week 5)
      render: markdown

  - type: textarea
    id: tasks
    attributes:
      label: 📊 Tasks
      description: Розбийте на окремі задачі (створіть issues пізніше і лінкуйте їх тут)
      placeholder: |
        ### Phase 1: Foundation
        - [ ] #XXX Task 1
        - [ ] #XXX Task 2

        ### Phase 2: Core Features
        - [ ] #XXX Task 3
        - [ ] #XXX Task 4

        ### Phase 3: Polish & Release
        - [ ] #XXX Task 5
        - [ ] #XXX Task 6
      render: markdown
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: 🔗 Dependencies
      description: Які інші issues або системи потрібні?
      placeholder: |
        **Blocks:**
        - #XXX - Не можна почати поки це не завершено

        **Blocked By:**
        - #XXX - Чекаємо на це

        **Related:**
        - #XXX - Подібна робота
      render: markdown

  - type: textarea
    id: technical
    attributes:
      label: 📝 Technical Design
      description: Технічний дизайн та ключові рішення
      placeholder: |
        ### Architecture Overview
        [Діаграма або опис]

        ### Key Decisions
        1. **Decision**: Використати X
           - **Rationale**: Тому що...
           - **Alternatives**: Розглядали Y, Z

        ### API Design
        ```
        POST /api/v1/resource
        GET  /api/v1/resource/:id
        ```
      render: markdown

  - type: textarea
    id: testing
    attributes:
      label: 🧪 Testing Strategy
      description: План тестування
      placeholder: |
        - [ ] Unit tests (>80% coverage)
        - [ ] Integration tests
        - [ ] E2E tests
        - [ ] Performance tests
        - [ ] Security tests
      render: markdown

  - type: textarea
    id: risks
    attributes:
      label: 🚦 Risks & Mitigation
      description: Потенційні ризики та план їх мітигації
      placeholder: |
        | Risk | Impact | Probability | Mitigation |
        |------|--------|-------------|------------|
        | API downtime | High | Low | Fallback mechanism |
        | Migration issues | Medium | Medium | Test on staging |
      render: markdown

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ Acceptance Criteria
      description: Коли ця ініціатива вважається завершеною?
      placeholder: |
        - [ ] Всі sub-tasks завершені
        - [ ] Тести проходять (>80% coverage)
        - [ ] Документація завершена
        - [ ] Security review пройдено
        - [ ] Stakeholder approval отримано
      render: markdown
    validations:
      required: true

  - type: textarea
    id: team
    attributes:
      label: 👥 Team
      description: Хто працює над цією ініціативою?
      placeholder: |
        - **Owner**: @username
        - **Tech Lead**: @username
        - **Contributors**: @user1, @user2
        - **Reviewers**: @reviewer1
      render: markdown

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-launch Checklist
      options:
        - label: Scope та objectives чітко визначені
          required: true
        - label: Stakeholders проінформовані
          required: true
        - label: Створені sub-issues або заплановані
